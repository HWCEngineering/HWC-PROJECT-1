name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hwc-breakline-gen-api
  CONTAINER_NAME: hwc-breakline-gen-api
  CONTAINER_APP_ENV: LiDAR-CONTAINER
  LOCATION: eastus2

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_url: ${{ steps.capture-url.outputs.api_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME_LC }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Container App Environment exists
        run: |
          if ! az containerapp env show \
            --name "${{ env.CONTAINER_APP_ENV }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then

            az containerapp env create \
              --name "${{ env.CONTAINER_APP_ENV }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --location "${{ env.LOCATION }}"
          fi

      - name: Create or update API Container App
        run: |
          IMAGE="ghcr.io/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}"

          if az containerapp show \
            --name "${{ env.CONTAINER_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then

            az containerapp registry set \
              --name "${{ env.CONTAINER_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --server ghcr.io \
              --username "${{ github.repository_owner }}" \
              --password "${{ secrets.GHCR_READ_TOKEN }}"

            az containerapp update \
              --name "${{ env.CONTAINER_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --image "$IMAGE" \
              --cpu 1.0 \
              --memory 2.0Gi \
              --set-env-vars \
                PORT=8000 \
                MONGO_CONNECTION_STRING="${{ secrets.MONGO_CONNECTION_STRING }}" \
                NAME="${{ vars.NAME }}" \
                AZURE_CONNECTION_STRING="${{ secrets.AZURE_CONNECTION_STRING }}"
          else
            az containerapp create \
              --name "${{ env.CONTAINER_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --environment "${{ env.CONTAINER_APP_ENV }}" \
              --image "$IMAGE" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 3 \
              --cpu 1.0 \
              --memory 2.0Gi \
              --registry-server ghcr.io \
              --registry-username "${{ github.repository_owner }}" \
              --registry-password "${{ secrets.GHCR_READ_TOKEN }}" \
              --env-vars \
                PORT=8000 \
                MONGO_CONNECTION_STRING="${{ secrets.MONGO_CONNECTION_STRING }}" \
                NAME="${{ vars.NAME }}" \
                AZURE_CONNECTION_STRING="${{ secrets.AZURE_CONNECTION_STRING }}"
          fi

      - name: Set ingress body size limit
        run: |
          az containerapp ingress update \
            --name "${{ env.CONTAINER_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --set-max-request-body-size 10240

      - name: Capture API URL
        id: capture-url
        run: |
          API_FQDN=$(az containerapp show \
            --name "${{ env.CONTAINER_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          if [ -z "$API_FQDN" ]; then
            echo "ERROR: Could not determine API FQDN"
            exit 1
          fi

          echo "api_url=https://$API_FQDN" >> "$GITHUB_OUTPUT"
          echo "API URL is https://$API_FQDN"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          PUBLIC_API_BASE_URL: ${{ needs.deploy-api.outputs.api_url }}
          PUBLIC_MAPTILER_API_KEY: ${{ vars.PUBLIC_MAPTILER_API_KEY }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "apps/web"
          output_location: "dist"
          build_location: "dist"
          app_build_command: "npm run build" # Let Azure build it
          ###### End of Repository/Build Configurations ######
